<!DOCTYPE html>
<html>
<head>
  <title>PAQUETES - LAURA SANCHEZ</title>
  <style>
    body {
      background-color: #252c4a;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .product-image {
      max-width: 100%;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .buy-button {
      padding: 15px 40px;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      background-color: #00aaff;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: background-color 0.3s ease;
      display: inline-block;
      margin-top: 10px;
      width: 100%;
      max-width: 300px;
    }

    .buy-button:hover {
      background-color: #0077cc;
    }

    .buy-button:focus {
      outline: none;
    }

    .image-wrapper {
      border: 2px solid #00aaff;
      margin: 10px;
      padding: 10px;
      display: inline-block;
    }

    .image-wrapper img {
      max-width: 100%;
    }

    .blink-animation {
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="product-image" src="https://i.ibb.co/vwr20pM/0102.png" alt="Imagem do Produto">

    <div>

    </div>

    <div>

      <a href="https://pay.hotmart.com/X72568740B?off=iz83e074"><button class="buy-button" type="button">COMPRAR AHORA</button></a>
    </div>

    <div>
      <h2 style="font-size: 32px; margin-bottom: 20px;">PAQUETE DE FUEGO</h2>
      <a href="https://pay.hotmart.com/X72568740B?off=ue262dve"><button class="buy-button blink-animation" type="button">COMPRAR AHORA</button></a>
    </div>

    <div>
      <h2 style="font-size: 32px; margin-bottom: 20px;">PAQUETE VIP</h2>
      <a href="https://pay.hotmart.com/X72568740B?off=ncncl1d9"><button class="buy-button" type="button">COMPRAR AHORA</button></a>
    </div>

    </div>

    <div class="image-wrapper">

    </div>
  </div>
</body>
</html>
